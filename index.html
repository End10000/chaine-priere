<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chaine de Priere - ICC Bremen</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#111B21;--panel:#1F2C34;--bubble:#202C33;
  --green:#00A884;--green2:#005C4B;--text:#E9EDEF;
  --muted:#8696A0;--border:#2A3942;--input:#2A3942;
  --red:#CF6679;--gold:#C8861A;
}
body{background:var(--bg);font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
.hdr{width:100%;max-width:480px;background:var(--panel);display:flex;align-items:center;gap:10px;padding:10px 14px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);}
.hdr-av{width:40px;height:40px;border-radius:50%;background:var(--green2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;cursor:pointer;}
.hdr-info{flex:1;min-width:0;cursor:pointer;}
.hdr-name{font-size:16px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-name:hover{color:var(--green);}
.hdr-sub{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-date{font-size:11px;color:var(--gold);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lbtns{display:flex;gap:4px;flex-shrink:0;}
.lbtn{background:var(--border);border:none;color:var(--muted);font-size:11px;font-weight:600;padding:4px 7px;border-radius:12px;cursor:pointer;font-family:inherit;transition:background 0.15s;}
.lbtn.active{background:var(--green);color:#fff;}
.lbtn:hover:not(.active){background:#3A4A52;color:var(--text);}
.stats{width:100%;max-width:480px;background:var(--panel);padding:7px 14px;display:flex;gap:12px;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;}
.stat{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.d-free{background:var(--green);}.d-taken{background:var(--gold);}
.syncdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--green);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.srchwrap{width:100%;max-width:480px;padding:8px 10px 0;}
.srchinp{width:100%;background:var(--bubble);border:none;border-radius:20px;padding:8px 14px;font-size:13px;color:var(--text);font-family:inherit;outline:none;}
.srchinp::placeholder{color:var(--muted);}
.chat{width:100%;max-width:480px;flex:1;padding:12px 10px 90px;}
.bbl{background:var(--bubble);border-radius:0 8px 8px 8px;padding:8px 8px 4px;}
.bmeta{display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:0 4px;}
.bav{width:28px;height:28px;border-radius:50%;background:var(--green2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0;}
.bsender{font-size:13px;font-weight:500;color:#64B5F6;}
.btime{font-size:11px;color:var(--muted);margin-left:auto;}
.ptitle{font-size:14px;font-weight:500;padding:2px 6px 8px;}
.orow{display:flex;align-items:center;gap:10px;padding:9px 6px;border-radius:8px;cursor:pointer;transition:background 0.1s;margin-bottom:1px;user-select:none;}
.orow:hover{background:rgba(255,255,255,0.05);}
.orow.sel{background:rgba(0,168,132,0.10);}
.orow.cur{border-left:3px solid var(--gold);padding-left:9px;}
.orow.busy{opacity:0.5;pointer-events:none;}
.wacircle{width:22px;height:22px;border-radius:50%;border:2px solid var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.orow.sel .wacircle{background:var(--green);border-color:var(--green);}
.wacheck{display:none;}
.orow.sel .wacheck{display:block;}
.ocontent{flex:1;min-width:0;}
.otime{font-size:15px;margin-bottom:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.nowbadge{font-size:10px;background:var(--gold);color:#1a0a00;padding:1px 6px;border-radius:10px;font-weight:600;flex-shrink:0;}
.obarwrap{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.obar{height:100%;background:var(--green);border-radius:2px;transition:width 0.3s;}
.vstk{display:flex;align-items:center;flex-shrink:0;}
.vav{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--bubble);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#fff;margin-left:-5px;flex-shrink:0;}
.vav:first-child{margin-left:0;}
.vcnt{font-size:12px;color:var(--muted);margin-left:5px;min-width:12px;}
.pdiv{border:none;border-top:1px solid var(--border);margin:4px 0;}
.pfooter{display:flex;flex-direction:column;}
.stmbtn{background:none;border:none;color:var(--green);font-size:14px;font-weight:500;padding:10px 6px 4px;cursor:pointer;text-align:left;font-family:inherit;}
.stmbtn:hover{opacity:0.8;}
.admbtn{background:none;border:none;color:var(--muted);font-size:13px;padding:4px 6px 8px;cursor:pointer;text-align:left;font-family:inherit;}
.admbtn:hover{color:var(--red);}
.botbar{width:100%;max-width:480px;background:var(--input);padding:10px 14px;position:fixed;bottom:0;display:flex;align-items:center;gap:10px;border-top:1px solid var(--border);}
.ninp{flex:1;background:var(--bubble);border:none;border-radius:20px;padding:9px 16px;font-size:14px;color:var(--text);font-family:inherit;outline:none;}
.ninp::placeholder{color:var(--muted);}
.sndbtn{width:42px;height:42px;border-radius:50%;background:var(--green);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sndbtn:hover{background:#009473;}
/* NAME MODAL (first visit) */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:flex-end;justify-content:center;}
.mbg.open{display:flex;}
.msh{background:var(--panel);border-radius:16px 16px 0 0;padding:1.5rem 1.25rem;width:100%;max-width:480px;animation:slideUp 0.2s ease;max-height:88vh;overflow-y:auto;}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.mtitle{font-size:16px;font-weight:500;margin-bottom:8px;}
.msub{font-size:13px;color:var(--muted);margin-bottom:1.25rem;line-height:1.5;}
.macts{display:flex;gap:8px;margin-top:1rem;}
.mbt{flex:1;padding:10px;border-radius:8px;border:none;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;}
.mbt:hover{opacity:0.85;}
.mbt-c{background:var(--border);color:var(--muted);}
.mbt-g{background:var(--green);color:#fff;}
.mbt-r{background:var(--red);color:#fff;}
.albl{font-size:12px;color:var(--muted);margin-bottom:4px;display:block;margin-top:8px;}
.ainp{width:100%;background:var(--bubble);border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;color:var(--text);font-family:inherit;outline:none;margin-bottom:8px;}
.ainp:focus{border-color:var(--green);}
.asel{width:100%;background:var(--bubble);border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;color:var(--text);font-family:inherit;outline:none;margin-bottom:8px;cursor:pointer;-webkit-appearance:none;appearance:none;}
.asel:focus{border-color:var(--green);}
.asec{margin-bottom:18px;}
.asec:last-child{margin-bottom:0;}
.asectitle{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.slotgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.slotbox{background:var(--bubble);border-radius:8px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.slotnum{font-size:26px;font-weight:700;color:var(--green);}
.vlist{max-height:45vh;overflow-y:auto;}
.vitem{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.vitem:last-child{border-bottom:none;}
.viav{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#fff;flex-shrink:0;}
.emsg{color:var(--muted);font-size:13px;text-align:center;padding:1.5rem;}
.ldmsg{color:var(--muted);font-size:14px;text-align:center;padding:2rem;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#2A3942;color:var(--text);padding:8px 18px;border-radius:6px;font-size:13px;opacity:0;transition:all 0.25s;z-index:300;pointer-events:none;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.warn-box{background:rgba(207,102,121,0.12);border:1px solid var(--red);border-radius:8px;padding:8px 12px;font-size:12px;color:#F4B8C1;margin-bottom:10px;display:none;}
</style>

<div class="hdr">
  <div class="hdr-av" id="hdrAv">&#9963;</div>
  <div class="hdr-info" id="hdrInfo">
    <div class="hdr-name" id="headerName">STAR ICC NORDDEUTSCHLAND</div>

    <div class="hdr-date" id="headerDate" style="display:none"></div>
  </div>

    <button class="lbtn active" id="btn-fr">FR</button>
    <button class="lbtn" id="btn-de">DE</button>
    <button class="lbtn" id="btn-en">EN</button>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="sdot d-free"></div><span id="sFree">--</span></div>
  <div class="stat"><div class="sdot d-taken"></div><span id="sTaken">--</span></div>
  <div class="stat"><span id="sNow"></span></div>
  <div class="stat" style="margin-left:auto">
    <div class="syncdot" id="syncDot"></div>
    <span id="syncLbl" style="font-size:11px;color:var(--muted)">...</span>
  </div>
</div>

<div class="srchwrap"><input class="srchinp" id="searchInp" placeholder="🔍 ..." oninput="renderSlots()"></div>

<div class="chat">
  <div class="bbl">
    <div class="bmeta">
      <div class="bav">M</div>
      <span class="bsender">MPI</span>
      <span class="btime" id="bTime"></span>
    </div>
    <div class="ptitle" id="pollTitle">📋 ...</div>
    <div id="optList"><div class="ldmsg" id="ldmsg">⏳ ...</div></div>
    <hr class="pdiv">
    <div class="pfooter">
      <button class="stmbtn" id="btnStimmen">---</button>
      <button class="admbtn" id="btnAdmin">⚙️ Admin</button>
    </div>
  </div>
</div>

<div class="botbar">
  <input class="ninp" id="nameInput" placeholder="..." maxlength="25">
  <button class="sndbtn" id="btnSend">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
  </button>
</div>

<!-- NAME MODAL (premiere fois) -->
<div class="mbg" id="nameModal">
  <div class="msh">
    <div class="mtitle" id="nmTitle">👋 Bienvenue</div>
    <div class="msub" id="nmSub">Entrez votre prenom pour participer a la chaine de priere.</div>
    <input class="ainp" id="nmInput" placeholder="Votre prenom..." maxlength="25">
    <div class="macts" style="margin-top:0">
      <button class="mbt mbt-g" id="nmBtn">✓ Confirmer</button>
    </div>
  </div>
</div>

<!-- ADMIN MODAL -->
<div class="mbg" id="adminModal">
  <div class="msh">
    <div class="mtitle" id="admTitle">⚙️ Admin</div>
    <div id="admLock">
      <div class="msub" id="admLockSub">Mot de passe administrateur.</div>
      <input class="ainp" id="admPwd" type="password" placeholder="Mot de passe...">
      <div class="macts" style="margin-top:0">
        <button class="mbt mbt-c" id="admBtnCancel">Annuler</button>
        <button class="mbt mbt-g" id="admBtnEnter">Entrer</button>
      </div>
    </div>
    <div id="admContent" style="display:none">
      <!-- TITRES -->
      <div class="asec">
        <div class="asectitle" id="admSecTitles">Modifier les titres</div>
        <label class="albl" id="admLblName">Nom du groupe</label>
        <input class="ainp" id="editName">
        <label class="albl" id="admLblSub">Sous-titre</label>
        <input class="ainp" id="editSub">
        <label class="albl" id="admLblPoll">Titre du sondage</label>
        <input class="ainp" id="editPollTitle">
        <label class="albl" id="admLblDate">Date du sondage (optionnel)</label>
        <input class="ainp" id="editDate" type="date">
      </div>
      <!-- CRENEAUX -->
      <div class="asec">
        <div class="asectitle" id="admSecSlots">Gerer les creneaux</div>
        <div class="slotbox">
          <div class="slotnum" id="slotCountDisp">0</div>
          <div id="admSlotLbl" style="font-size:13px;color:var(--muted)">creneaux</div>
        </div>
        <div id="slotWarnBox" class="warn-box"></div>
        <div class="slotgrid">
          <div>
            <label class="albl" id="admLblStart">Debut</label>
            <select class="asel" id="slotStart" onchange="updateSlotCount()"></select>
          </div>
          <div>
            <label class="albl" id="admLblEnd">Fin</label>
            <select class="asel" id="slotEnd" onchange="updateSlotCount()"></select>
          </div>
        </div>
      </div>
      <!-- DANGER -->
      <div class="asec">
        <div class="asectitle" id="admSecDanger">Zone danger</div>
        <button class="mbt mbt-r" style="width:100%;margin-bottom:8px" id="admBtnReset">🔄 Reinitialiser tous les votes</button>
      </div>
      <div class="macts">
        <button class="mbt mbt-c" id="admBtnClose">Fermer</button>
        <button class="mbt mbt-g" id="admBtnSave">✓ Enregistrer</button>
      </div>
    </div>
  </div>
</div>

<!-- VOTERS MODAL -->
<div class="mbg" id="votersModal">
  <div class="msh">
    <div class="mtitle" id="votersTitle" style="margin-bottom:1rem">Tous les votes</div>
    <div class="vlist" id="voterList"></div>
    <div style="margin-top:1rem">
      <button class="mbt mbt-c" id="btnVotersClose" style="width:100%">Fermer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

function setLang(l){
  lang=l;ls.lang=l;saveLocal();
  ['fr','de','en'].forEach(function(x){
    document.getElementById('btn-'+x).classList.toggle('active',x===l);
  });
  applyLang();
  renderSlots();
}

// ============================================================
// COULEURS
// ============================================================
var COLORS=['#E53935','#8E24AA','#1E88E5','#00897B','#F4511E','#3949AB','#039BE5','#43A047','#FB8C00','#6D4C41','#D81B60','#5E35B1'];
function gc(n){var h=0;for(var i=0;i<n.length;i++)h=(h*31+n.charCodeAt(i))%COLORS.length;return COLORS[Math.abs(h)];}
function gi(n){var p=n.trim().split(' '),r='';for(var i=0;i<Math.min(p.length,2);i++)if(p[i])r+=p[i][0].toUpperCase();return r||'?';}

// ============================================================
// ETAT
// ============================================================
var ls={
  userName:'',lang:'fr',
  startH:8,startM:0,endH:24,endM:0,
  headerName:'STAR ICC NORDDEUTSCHLAND',
  headerSub:'Chaine de Priere · 21 Jours Jeune et Priere',
  pollTitle:'📋 Chaine de priere — Choisissez vos creneaux',
  pollDate:''
};
var allVotes=[];
var synced=false;

function loadLocal(){
  try{var s=localStorage.getItem(LOCAL_KEY);if(s){var p=JSON.parse(s);for(var k in p)ls[k]=p[k];}}catch(e){}
}
function saveLocal(){
  try{localStorage.setItem(LOCAL_KEY,JSON.stringify(ls));}catch(e){}
}

// ============================================================
// SUPABASE
// ============================================================
function sfetch(path,method,body){
  var o={method:method||'GET',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':method==='POST'?'return=minimal':''}};
  if(body!==undefined)o.body=JSON.stringify(body);
  return fetch(SUPA_URL+'/rest/v1/'+path,o);
}
function loadVotes(){
  return sfetch('votes?select=slot_key,user_name')
    .then(function(r){if(!r.ok)throw new Error(r.status);return r.json();})
    .then(function(d){if(Array.isArray(d)){allVotes=d;setSyncStatus(true);}})
    .catch(function(){setSyncStatus(false);});
}
function loadConfig(){
  return sfetch('config?select=key,value')
    .then(function(r){if(!r.ok)throw new Error();return r.json();})
    .then(function(d){
      if(!Array.isArray(d))return;
      d.forEach(function(row){
        if(row.key==='headerName')ls.headerName=row.value;
        if(row.key==='headerSub')ls.headerSub=row.value;
        if(row.key==='pollTitle')ls.pollTitle=row.value;
        if(row.key==='pollDate')ls.pollDate=row.value;
        if(row.key==='startMin'){var hm=fromMin(parseInt(row.value,10));ls.startH=hm.h;ls.startM=hm.m;}
        if(row.key==='endMin'){
          var v=parseInt(row.value,10);
          if(v===1440){ls.endH=24;ls.endM=0;}
          else{var hm2=fromMin(v);ls.endH=hm2.h;ls.endM=hm2.m;}
        }
      });
    }).catch(function(){});
}
function saveCfg(k,v){
  return sfetch('config?key=eq.'+encodeURIComponent(k),'DELETE')
    .then(function(){return sfetch('config','POST',{key:k,value:String(v)});});
}
function addVote(sk,un){return sfetch('votes','POST',{slot_key:sk,user_name:un});}
function removeVote(sk,un){return sfetch('votes?slot_key=eq.'+encodeURIComponent(sk)+'&user_name=eq.'+encodeURIComponent(un),'DELETE');}
function resetAll(){return sfetch('votes?slot_key=neq.__none__','DELETE');}

function setSyncStatus(ok){
  synced=ok;
  var dot=document.getElementById('syncDot'),lbl=document.getElementById('syncLbl');
  dot.style.background=ok?'var(--green)':'var(--red)';
  dot.style.animation=ok?'pulse 1.5s infinite':'none';
  lbl.textContent=tx(ok?'syncOk':'syncErr');
}

// ============================================================
// SLOTS — pas de validation start/end, supporte minuit
// ============================================================
function pad(n){return n<10?'0'+n:''+n;}
function toMin(h,m){return h*60+m;}
function fromMin(t){return{h:Math.floor(t/60)%24,m:t%60};}

function genSlots(){
  var arr=[];
  var sm=toMin(ls.startH,ls.startM);
  var em=(ls.endH===24&&ls.endM===0)?1440:toMin(ls.endH,ls.endM);
  // Si fin <= debut : on fait debut → minuit → fin (creneaux qui passent minuit)
  var total;
  if(em>sm){
    total=em-sm;
  } else {
    // Passe minuit : debut → 1440 + fin
    total=(1440-sm)+em;
  }
  for(var i=0;i<total;i+=15){
    var t=(sm+i)%1440;
    var tn=(sm+i+15)%1440;
    var cur=fromMin(t),nxt=fromMin(tn);
    arr.push({
      key:cur.h+':'+pad(cur.m),
      label:pad(cur.h)+'H'+pad(cur.m)+' - '+pad(nxt.h)+'H'+pad(nxt.m)
    });
  }
  return arr;
}

function getCurKey(){
  var n=new Date();
  return n.getHours()+':'+pad(Math.floor(n.getMinutes()/15)*15);
}

// ============================================================
// RENDU
// ============================================================
function renderSlots(){
  var now=new Date();
  document.getElementById('bTime').textContent=pad(now.getHours())+':'+pad(now.getMinutes());
  document.getElementById('headerName').textContent=ls.headerName;
  document.getElementById('headerSub').textContent=ls.headerSub+' ✏️';
  document.getElementById('pollTitle').textContent=ls.pollTitle;
  // Date
  var dateEl=document.getElementById('headerDate');
  if(ls.pollDate){
    // Formatter la date
    try{
      var d=new Date(ls.pollDate+'T00:00:00');
      var opts={weekday:'long',year:'numeric',month:'long',day:'numeric'};
      dateEl.textContent='📅 '+d.toLocaleDateString(lang==='de'?'de-DE':lang==='en'?'en-GB':'fr-FR',opts);
      dateEl.style.display='block';
    }catch(e){dateEl.style.display='none';}
  } else {
    dateEl.style.display='none';
  }

  var inp=document.getElementById('nameInput');
  if(ls.userName&&!inp.value)inp.value=ls.userName;

  var srch=document.getElementById('searchInp').value.toLowerCase();
  var curKey=getCurKey();
  var SLOTS=genSlots();
  var total=allVotes.length;
  var free=0,taken=0,curLabel='';
  var list=document.getElementById('optList');
  list.innerHTML='';

  SLOTS.forEach(function(slot){
    if(srch&&slot.label.toLowerCase().indexOf(srch)===-1)return;
    var voters=allVotes.filter(function(v){return v.slot_key===slot.key;}).map(function(v){return v.user_name;});
    var isMine=(ls.userName!==''&&voters.indexOf(ls.userName)!==-1);
    var isCur=(slot.key===curKey);
    if(isCur)curLabel=slot.label;
    if(voters.length===0)free++;else taken++;
    var pct=(total>0&&voters.length>0)?Math.max(Math.round(voters.length/total*100),5):0;
    var row=document.createElement('div');
    row.className='orow'+(isMine?' sel':'')+(isCur?' cur':'');
    var avH=voters.slice(0,3).map(function(n){
      return'<div class="vav" style="background:'+gc(n)+'" title="'+n+'">'+gi(n)+'</div>';
    }).join('');
    row.innerHTML=
      '<div class="wacircle"><svg class="wacheck" width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>'+
      '<div class="ocontent"><div class="otime">🙏 '+slot.label+
      (isCur?' <span class="nowbadge">'+tx('nowBadge')+'</span>':'')+
      '</div><div class="obarwrap"><div class="obar" style="width:'+pct+'%"></div></div></div>'+
      '<div class="vstk">'+avH+'<div class="vcnt">'+(voters.length>0?voters.length:'')+'</div></div>';
    (function(sk,mine){
      row.onclick=function(){
        if(!ls.userName){openNameModal();return;}
        row.classList.add('busy');
        var op=mine?removeVote(sk,ls.userName):addVote(sk,ls.userName);
        op.then(function(r){if(!r.ok)throw new Error();return loadVotes();})
          .then(function(){renderSlots();})
          .catch(function(){showToast(tx('errConn'));row.classList.remove('busy');});
      };
    })(slot.key,isMine);
    list.appendChild(row);
  });
  if(list.children.length===0)list.innerHTML='<div class="emsg">'+tx('noVotes')+'</div>';
  document.getElementById('sFree').textContent=free+(free!==1?' '+tx('free'):' '+tx('freeOne'));
  document.getElementById('sTaken').textContent=taken+' '+tx('taken');
  document.getElementById('sNow').textContent=curLabel?'⏰ '+curLabel:'';
}

// ============================================================
// PRENOM — modal premiere fois, barre en bas ensuite
// ============================================================
function openNameModal(){
  document.getElementById('nmInput').value='';
  document.getElementById('nameModal').classList.add('open');
  setTimeout(function(){document.getElementById('nmInput').focus();},250);
}
function confirmName(){
  var v=document.getElementById('nmInput').value.trim();
  if(!v)return;
  ls.userName=v;saveLocal();
  document.getElementById('nameInput').value=v;
  document.getElementById('nameModal').classList.remove('open');
  showToast(tx('hello')+v+' !');
  renderSlots();
}
function setName(){
  var v=document.getElementById('nameInput').value.trim();
  if(!v){openNameModal();return;}
  ls.userName=v;saveLocal();renderSlots();
  showToast(tx('hello')+v+' !');
}

// ============================================================
// VOTERS
// ============================================================
function openVoters(){
  var SLOTS=genSlots(),list=document.getElementById('voterList');
  list.innerHTML='';var has=false;
  SLOTS.forEach(function(slot){
    allVotes.filter(function(v){return v.slot_key===slot.key;}).forEach(function(v){
      has=true;var item=document.createElement('div');item.className='vitem';
      item.innerHTML='<div class="viav" style="background:'+gc(v.user_name)+'">'+gi(v.user_name)+'</div>'+
        '<div><div style="font-size:14px">'+v.user_name+'</div>'+
        '<div style="font-size:12px;color:var(--muted)">🙏 '+slot.label+'</div></div>';
      list.appendChild(item);
    });
  });
  if(!has)list.innerHTML='<div class="emsg">'+tx('noVotes')+'</div>';
  document.getElementById('votersModal').classList.add('open');
}
function closeVoters(){document.getElementById('votersModal').classList.remove('open');}

// ============================================================
// ADMIN
// ============================================================
function buildSelects(){
  var ss=document.getElementById('slotStart'),se=document.getElementById('slotEnd');
  ss.innerHTML='';se.innerHTML='';
  for(var t=0;t<1440;t+=15){
    var hm=fromMin(t),o=document.createElement('option');
    o.value=t;o.textContent=pad(hm.h)+'H'+pad(hm.m);ss.appendChild(o);
  }
  // Fin : toutes les heures + 00H00 (minuit=1440)
  for(var t2=15;t2<=1440;t2+=15){
    var hm2=fromMin(t2%1440),o2=document.createElement('option');
    o2.value=t2;
    o2.textContent=pad(hm2.h)+'H'+pad(hm2.m)+(t2===1440?' (00H00)':'');
    se.appendChild(o2);
  }
}

function updateSlotCount(){
  var ss=document.getElementById('slotStart');
  var se=document.getElementById('slotEnd');
  if(!ss||!se)return;
  var sm=parseInt(ss.value,10);
  var em=parseInt(se.value,10);
  if(isNaN(sm)||isNaN(em)){document.getElementById('slotCountDisp').textContent='0';return;}
  var total;
  var warnBox=document.getElementById('slotWarnBox');
  if(em>sm){
    total=Math.floor((em-sm)/15);
    warnBox.style.display='none';
  } else {
    // Passe minuit
    total=Math.floor((1440-sm+em)/15);
    warnBox.textContent=tx('slotWarn');
    warnBox.style.display='block';
  }
  document.getElementById('slotCountDisp').textContent=total>0?total:0;
}

function openAdmin(){
  document.getElementById('admLock').style.display='block';
  document.getElementById('admContent').style.display='none';
  document.getElementById('admPwd').value='';
  document.getElementById('adminModal').classList.add('open');
  setTimeout(function(){document.getElementById('admPwd').focus();},250);
}
function closeAdmin(){document.getElementById('adminModal').classList.remove('open');}

function unlockAdmin(){
  var pwd=document.getElementById('admPwd').value;
  if(pwd!==ADMIN_PWD){
    showToast(tx('wrongPwd'));
    document.getElementById('admPwd').value='';
    document.getElementById('admPwd').focus();
    return;
  }
  // Remplir les champs
  document.getElementById('editName').value=ls.headerName;
  document.getElementById('editSub').value=ls.headerSub;
  document.getElementById('editPollTitle').value=ls.pollTitle;
  document.getElementById('editDate').value=ls.pollDate||'';
  buildSelects();
  var sm=toMin(ls.startH,ls.startM);
  var em=(ls.endH===24&&ls.endM===0)?1440:toMin(ls.endH,ls.endM);
  document.getElementById('slotStart').value=sm;
  document.getElementById('slotEnd').value=em;
  updateSlotCount();
  document.getElementById('admLock').style.display='none';
  document.getElementById('admContent').style.display='block';
}

function saveAdmin(){
  var nn=document.getElementById('editName').value.trim();
  var ns=document.getElementById('editSub').value.trim();
  var np=document.getElementById('editPollTitle').value.trim();
  var nd=document.getElementById('editDate').value;
  var sm=parseInt(document.getElementById('slotStart').value,10);
  var em=parseInt(document.getElementById('slotEnd').value,10);
  if(isNaN(sm)||isNaN(em)){showToast('⚠️ Erreur horaires');return;}
  if(nn)ls.headerName=nn;
  if(ns)ls.headerSub=ns;
  if(np)ls.pollTitle=np;
  ls.pollDate=nd;
  var shm=fromMin(sm);ls.startH=shm.h;ls.startM=shm.m;
  if(em===1440){ls.endH=24;ls.endM=0;}
  else{var ehm=fromMin(em);ls.endH=ehm.h;ls.endM=ehm.m;}
  saveLocal();
  // Sync Supabase
  var saves=[
    saveCfg('headerName',ls.headerName),
    saveCfg('headerSub',ls.headerSub),
    saveCfg('pollTitle',ls.pollTitle),
    saveCfg('pollDate',ls.pollDate),
    saveCfg('startMin',sm),
    saveCfg('endMin',em)
  ];
  Promise.all(saves).catch(function(){});
  renderSlots();closeAdmin();showToast(tx('saved'));
}

function doReset(){
  if(!confirm(tx('resetConfirm')))return;
  resetAll()
    .then(function(r){if(!r.ok)throw new Error();return loadVotes();})
    .then(function(){
      // NE PAS effacer le prenom — juste les votes
      renderSlots();closeAdmin();showToast(tx('resetDone'));
    })
    .catch(function(){showToast(tx('errReset'));});
}

// ============================================================
// TOAST
// ============================================================
var ttt;
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(ttt);ttt=setTimeout(function(){t.classList.remove('show');},3000);
}

// EVENTS — tous attaches ici
// ============================================================
document.getElementById('hdrAv').onclick    = openAdmin;
document.getElementById('hdrInfo').onclick  = openAdmin;
document.getElementById('btnAdmin').onclick = openAdmin;
document.getElementById('btnStimmen').onclick = openVoters;
document.getElementById('btnSend').onclick  = setName;

document.getElementById('nmBtn').onclick    = confirmName;
document.getElementById('nmInput').addEventListener('keydown',function(e){if(e.key==='Enter')confirmName();});
// Admin
document.getElementById('admBtnCancel').onclick = closeAdmin;
document.getElementById('admBtnEnter').onclick  = unlockAdmin;
document.getElementById('admBtnClose').onclick  = closeAdmin;
document.getElementById('admBtnSave').onclick   = saveAdmin;
document.getElementById('admBtnReset').onclick  = doReset;
document.getElementById('admPwd').addEventListener('keydown',function(e){if(e.key==='Enter')unlockAdmin();});
// Voters
document.getElementById('btnVotersClose').onclick = closeVoters;

document.getElementById('nameInput').addEventListener('keydown',function(e){if(e.key==='Enter')setName();});

document.getElementById('btn-fr').onclick = function(){setLang('fr');};
document.getElementById('btn-de').onclick = function(){setLang('de');};
document.getElementById('btn-en').onclick = function(){setLang('en');};

// ============================================================
// POLLING
// ============================================================
function startPolling(){
  setInterval(function(){loadVotes().then(function(){renderSlots();});},5000);
}
setInterval(function(){
  var n=new Date();
  document.getElementById('bTime').textContent=pad(n.getHours())+':'+pad(n.getMinutes());
},30000);

// ============================================================
// INIT
// ============================================================
loadLocal();
lang=ls.lang||'fr';
['fr','de','en'].forEach(function(l){
  document.getElementById('btn-'+l).classList.toggle('active',l===lang);
});
buildSelects();
applyLang();
if(ls.userName)document.getElementById('nameInput').value=ls.userName;

// Si pas de prenom : ouvrir le modal au chargement
loadConfig()
  .then(function(){return loadVotes();})
  .then(function(){
    renderSlots();
    startPolling();
    if(!ls.userName){
      setTimeout(function(){openNameModal();},600);
    }
  })
  .catch(function(){
    renderSlots();
    startPolling();
    if(!ls.userName){
      setTimeout(function(){openNameModal();},600);
    }
  });
</script>

<style>
* { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg:#111B21; --panel:#1F2C34; --bubble:#202C33;
  --green:#00A884; --green2:#005C4B; --text:#E9EDEF;
  --muted:#8696A0; --border:#2A3942; --input:#2A3942;
  --red:#CF6679; --gold:#C8861A;
}
body { background:var(--bg); font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif; color:var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center; }
.wa-header { width:100%; max-width:480px; background:var(--panel); display:flex; align-items:center; gap:12px; padding:10px 16px; position:sticky; top:0; z-index:100; border-bottom:1px solid var(--border); }
.wa-avatar { width:40px; height:40px; border-radius:50%; background:var(--green2); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; cursor:pointer; }
.wa-header-info { flex:1; min-width:0; }
.wa-header-name { font-size:16px; font-weight:500; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.wa-header-name:hover { color:var(--green); }
.wa-header-sub { font-size:12px; color:var(--muted); cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lang-btns { display:flex; gap:4px; flex-shrink:0; }
.lang-btn { background:var(--border); border:none; color:var(--muted); font-size:11px; font-weight:600; padding:4px 8px; border-radius:12px; cursor:pointer; font-family:inherit; }
.lang-btn.active { background:var(--green); color:#fff; }
.lang-btn:hover:not(.active) { background:#3A4A52; color:var(--text); }
.stats-bar { width:100%; max-width:480px; background:var(--panel); padding:8px 16px; display:flex; gap:14px; border-bottom:1px solid var(--border); flex-wrap:wrap; align-items:center; }
.stat { font-size:12px; color:var(--muted); display:flex; align-items:center; gap:5px; }
.stat-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.d-free { background:var(--green); }
.d-taken { background:var(--gold); }
.sync-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; background:var(--green); animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
.search-wrap { width:100%; max-width:480px; padding:8px 10px 0; }
.search-inp { width:100%; background:var(--bubble); border:none; border-radius:20px; padding:8px 14px; font-size:13px; color:var(--text); font-family:inherit; outline:none; }
.search-inp::placeholder { color:var(--muted); }
.chat-area { width:100%; max-width:480px; flex:1; padding:12px 10px 90px; }
.bubble { background:var(--bubble); border-radius:0 8px 8px 8px; padding:8px 8px 4px; }
.bubble-meta { display:flex; align-items:center; gap:8px; margin-bottom:6px; padding:0 4px; }
.b-av { width:28px; height:28px; border-radius:50%; background:var(--green2); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; color:#fff; flex-shrink:0; }
.b-sender { font-size:13px; font-weight:500; color:#64B5F6; }
.b-time { font-size:11px; color:var(--muted); margin-left:auto; }
.poll-title { font-size:14px; font-weight:500; padding:2px 6px 8px; }
.option-row { display:flex; align-items:center; gap:10px; padding:9px 6px; border-radius:8px; cursor:pointer; transition:background 0.1s; margin-bottom:1px; user-select:none; }
.option-row:hover { background:rgba(255,255,255,0.05); }
.option-row.selected { background:rgba(0,168,132,0.10); }
.option-row.current-slot { border-left:3px solid var(--gold); padding-left:9px; }
.option-row.loading-row { opacity:0.5; pointer-events:none; }
.wa-circle { width:22px; height:22px; border-radius:50%; border:2px solid var(--muted); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.1s; }
.option-row.selected .wa-circle { background:var(--green); border-color:var(--green); }
.wa-check { display:none; }
.option-row.selected .wa-check { display:block; }
.option-content { flex:1; min-width:0; }
.option-time { font-size:15px; margin-bottom:4px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.now-badge { font-size:10px; background:var(--gold); color:#1a0a00; padding:1px 6px; border-radius:10px; font-weight:600; flex-shrink:0; }
.option-bar-wrap { height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
.option-bar { height:100%; background:var(--green); border-radius:2px; transition:width 0.3s; }
.voter-stack { display:flex; align-items:center; flex-shrink:0; }
.voter-av { width:22px; height:22px; border-radius:50%; border:1.5px solid var(--bubble); display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:600; color:#fff; margin-left:-5px; flex-shrink:0; }
.voter-av:first-child { margin-left:0; }
.voter-count { font-size:12px; color:var(--muted); margin-left:5px; min-width:12px; }
.poll-divider { border:none; border-top:1px solid var(--border); margin:4px 0; }
.poll-footer { display:flex; flex-direction:column; }
.stimmen-btn { background:none; border:none; color:var(--green); font-size:14px; font-weight:500; padding:10px 6px 4px; cursor:pointer; text-align:left; font-family:inherit; }
.stimmen-btn:hover { opacity:0.8; }
.admin-btn { background:none; border:none; color:var(--muted); font-size:13px; padding:4px 6px 8px; cursor:pointer; text-align:left; font-family:inherit; }
.admin-btn:hover { color:var(--red); }
.bottom-bar { width:100%; max-width:480px; background:var(--input); padding:10px 14px; position:fixed; bottom:0; display:flex; align-items:center; gap:10px; border-top:1px solid var(--border); }
.name-inp { flex:1; background:var(--bubble); border:none; border-radius:20px; padding:9px 16px; font-size:14px; color:var(--text); font-family:inherit; outline:none; }
.name-inp::placeholder { color:var(--muted); }
.send-btn { width:42px; height:42px; border-radius:50%; background:var(--green); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background 0.15s; }
.send-btn:hover { background:#009473; }
.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:200; align-items:flex-end; justify-content:center; }
.modal-bg.open { display:flex; }
.modal-sheet { background:var(--panel); border-radius:16px 16px 0 0; padding:1.5rem 1.25rem; width:100%; max-width:480px; animation:slideUp 0.2s ease; max-height:88vh; overflow-y:auto; }
@keyframes slideUp { from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1} }
.modal-title { font-size:16px; font-weight:500; margin-bottom:8px; }
.modal-sub { font-size:13px; color:var(--muted); margin-bottom:1.25rem; line-height:1.5; }
.modal-actions { display:flex; gap:8px; margin-top:1rem; }
.mbt { flex:1; padding:10px; border-radius:8px; border:none; font-size:14px; font-weight:500; cursor:pointer; font-family:inherit; transition:opacity 0.15s; }
.mbt:hover { opacity:0.85; }
.mbt-cancel { background:var(--border); color:var(--muted); }
.mbt-green { background:var(--green); color:#fff; }
.mbt-red { background:var(--red); color:#fff; }
.adm-label { font-size:12px; color:var(--muted); margin-bottom:4px; display:block; }
.adm-inp { width:100%; background:var(--bubble); border:1.5px solid var(--border); border-radius:8px; padding:10px 14px; font-size:14px; color:var(--text); font-family:inherit; outline:none; margin-bottom:12px; }
.adm-inp:focus { border-color:var(--green); }
.adm-select { width:100%; background:var(--bubble); border:1.5px solid var(--border); border-radius:8px; padding:10px 14px; font-size:14px; color:var(--text); font-family:inherit; outline:none; margin-bottom:12px; cursor:pointer; -webkit-appearance:none; appearance:none; }
.adm-select:focus { border-color:var(--green); }
.admin-section { margin-bottom:20px; }
.admin-section:last-child { margin-bottom:0; }
.admin-section-title { font-size:11px; font-weight:600; color:var(--muted); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:12px; padding-bottom:6px; border-bottom:1px solid var(--border); }
.slot-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.slot-count-box { background:var(--bubble); border-radius:8px; padding:10px 14px; margin-bottom:12px; display:flex; align-items:center; gap:10px; }
.slot-count-num { font-size:28px; font-weight:700; color:var(--green); }
.voter-list { max-height:45vh; overflow-y:auto; }
.voter-item { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); }
.voter-item:last-child { border-bottom:none; }
.vi-av { width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:600; color:#fff; flex-shrink:0; }
.empty-msg { color:var(--muted); font-size:13px; text-align:center; padding:1.5rem; }
.loading-msg { color:var(--muted); font-size:14px; text-align:center; padding:2rem; }
.toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px); background:#2A3942; color:var(--text); padding:8px 18px; border-radius:6px; font-size:13px; opacity:0; transition:all 0.25s; z-index:300; pointer-events:none; white-space:nowrap; max-width:90vw; overflow:hidden; text-overflow:ellipsis; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

<div class="wa-header">
  <div class="wa-avatar" onclick="openAdmin()">&#9963;</div>
  <div class="wa-header-info">
    <div class="wa-header-name" id="headerName" onclick="openAdmin()">STAR ICC NORDDEUTSCHLAND</div>
    <div class="wa-header-sub" id="headerSub" onclick="openAdmin()">Chaine de Priere ✏️</div>
  </div>
  <div class="lang-btns">
    <button class="lang-btn active" id="btn-fr" onclick="setLang('fr')">FR</button>
    <button class="lang-btn" id="btn-de" onclick="setLang('de')">DE</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
  </div>
</div>

<div class="stats-bar">
  <div class="stat"><div class="stat-dot d-free"></div><span id="sFree">--</span></div>
  <div class="stat"><div class="stat-dot d-taken"></div><span id="sTaken">--</span></div>
  <div class="stat"><span id="sNow"></span></div>
  <div class="stat" style="margin-left:auto">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncLabel" style="font-size:11px;color:var(--muted)">...</span>
  </div>
</div>

<div class="search-wrap">
  <input class="search-inp" id="searchInp" placeholder="🔍 ..." oninput="renderSlots()">
</div>

<div class="chat-area">
  <div class="bubble">
    <div class="bubble-meta">
      <div class="b-av">M</div>
      <span class="b-sender">MPI</span>
      <span class="b-time" id="bTime"></span>
    </div>
    <div class="poll-title" id="pollTitle">📋 ...</div>
    <div id="optionsList"><div class="loading-msg" id="loadingMsg">⏳ Chargement...</div></div>
    <hr class="poll-divider">
    <div class="poll-footer">
      <button class="stimmen-btn" id="btnVoters" onclick="openVoters()">Stimmen ansehen</button>
      <button class="admin-btn" onclick="openAdmin()">⚙️ Admin</button>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <input class="name-inp" id="nameInput" placeholder="..." maxlength="25">
  <button class="send-btn" onclick="setName()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
  </button>
</div>

<!-- ADMIN MODAL -->
<div class="modal-bg" id="adminModal">
  <div class="modal-sheet">
    <div class="modal-title" id="adminTitle">⚙️ Panneau Admin</div>
    <div id="adminLock">
      <div class="modal-sub" id="adminLockSub">Entrez le mot de passe administrateur.</div>
      <input class="adm-inp" id="adminPwd" type="password" placeholder="Mot de passe...">
      <div class="modal-actions" style="margin-top:0">
        <button class="mbt mbt-cancel" id="btnAdminCancel" onclick="closeAdmin()">Annuler</button>
        <button class="mbt mbt-green" id="btnAdminEnter" onclick="unlockAdmin()">Entrer</button>
      </div>
    </div>
    <div id="adminContent" style="display:none">
      <div class="admin-section">
        <div class="admin-section-title" id="admSecTitles">Modifier les titres</div>
        <label class="adm-label" id="admLblName">Nom du groupe</label>
        <input class="adm-inp" id="editName">
        <label class="adm-label" id="admLblSub">Sous-titre</label>
        <input class="adm-inp" id="editSub">
        <label class="adm-label" id="admLblPoll">Titre du sondage</label>
        <input class="adm-inp" id="editPollTitle">
      </div>
      <div class="admin-section">
        <div class="admin-section-title" id="admSecSlots">Gerer les creneaux (pas de 15 min)</div>
        <div class="slot-count-box">
          <div class="slot-count-num" id="slotCountDisp">0</div>
          <div id="admSlotLabel" style="font-size:13px;color:var(--muted)">creneaux de 15 min</div>
        </div>
        <div class="slot-grid">
          <div>
            <label class="adm-label" id="admLblStart">Debut</label>
            <select class="adm-select" id="slotStart" onchange="updateSlotCount()"></select>
          </div>
          <div>
            <label class="adm-label" id="admLblEnd">Fin</label>
            <select class="adm-select" id="slotEnd" onchange="updateSlotCount()"></select>
          </div>
        </div>
      </div>
      <div class="admin-section">
        <div class="admin-section-title" id="admSecDanger">Zone danger</div>
        <button class="mbt mbt-red" id="btnReset" style="width:100%" onclick="doReset()">🔄 Reinitialiser tous les votes</button>
      </div>
      <div class="modal-actions">
        <button class="mbt mbt-cancel" id="btnAdminClose" onclick="closeAdmin()">Fermer</button>
        <button class="mbt mbt-green" id="btnAdminSave" onclick="saveAdmin()">✓ Enregistrer</button>
      </div>
    </div>
  </div>
</div>

var currentLang = 'fr';

function t(key) { return T[currentLang][key] || T['fr'][key] || key; }

function setLang(lang) {
  currentLang = lang;
  ls.lang = lang;
  saveLocal();
  ['fr','de','en'].forEach(function(l) {
    document.getElementById('btn-'+l).classList.toggle('active', l === lang);
  });
  applyTranslations();
  renderSlots();
}

        se.options[i].textContent = t('midnight');
      }

var COLORS = ['#E53935','#8E24AA','#1E88E5','#00897B','#F4511E','#3949AB','#039BE5','#43A047','#FB8C00','#6D4C41','#D81B60','#5E35B1'];
function getColor(n) { var h=0; for(var i=0;i<n.length;i++) h=(h*31+n.charCodeAt(i))%COLORS.length; return COLORS[Math.abs(h)]; }
function getInitials(n) { var p=n.trim().split(' '),r=''; for(var i=0;i<Math.min(p.length,2);i++) if(p[i]) r+=p[i][0].toUpperCase(); return r||'?'; }

// ============================================================
// ETAT
// ============================================================
var ls = {
  userName:'', lang:'fr',
  startH:8, startM:0, endH:24, endM:0,
  headerName:'STAR ICC NORDDEUTSCHLAND',
  headerSub:'Chaine de Priere · 21 Jours Jeune et Priere',
  pollTitle:'📋 Chaine de priere — Choisissez vos creneaux'
};
var allVotes = [];
var synced = false;

function loadLocal() {
  try { var s=localStorage.getItem(LOCAL_KEY); if(s){var p=JSON.parse(s);for(var k in p) ls[k]=p[k];} } catch(e){}
}
function saveLocal() {
  try { localStorage.setItem(LOCAL_KEY, JSON.stringify(ls)); } catch(e){}
}

// ============================================================
// SUPABASE API
// ============================================================
function supaFetch(path, method, body) {
  var opts = {
    method: method || 'GET',
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': (method === 'POST') ? 'return=minimal' : ''
    }
  };
  if (body !== undefined) opts.body = JSON.stringify(body);
  return fetch(SUPA_URL + '/rest/v1/' + path, opts);
}

function loadVotes() {
  return supaFetch('votes?select=slot_key,user_name')
    .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(function(d){ if(Array.isArray(d)){ allVotes=d; setSyncStatus(true); } })
    .catch(function(){ setSyncStatus(false); });
}

function loadConfig() {
  return supaFetch('config?select=key,value')
    .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(function(d){
      if(!Array.isArray(d)) return;
      d.forEach(function(row){
        if(row.key==='headerName') ls.headerName=row.value;
        if(row.key==='headerSub')  ls.headerSub=row.value;
        if(row.key==='pollTitle')  ls.pollTitle=row.value;
        if(row.key==='startMin'){var hm=fromMin(parseInt(row.value,10));ls.startH=hm.h;ls.startM=hm.m;}
        if(row.key==='endMin'){
          var v=parseInt(row.value,10);
          if(v===1440){ls.endH=24;ls.endM=0;}
          else{var hm2=fromMin(v);ls.endH=hm2.h;ls.endM=hm2.m;}
        }
      });
    })
    .catch(function(){});
}

function saveConfigKey(key, value) {
  return supaFetch('config?key=eq.'+encodeURIComponent(key), 'DELETE')
    .then(function(){ return supaFetch('config', 'POST', {key:key, value:String(value)}); });
}

function addVote(slotKey, userName) {
  return supaFetch('votes', 'POST', {slot_key:slotKey, user_name:userName});
}

function removeVote(slotKey, userName) {
  return supaFetch(
    'votes?slot_key=eq.'+encodeURIComponent(slotKey)+'&user_name=eq.'+encodeURIComponent(userName),
    'DELETE'
  );
}

function resetAllVotes() {
  return supaFetch('votes?slot_key=neq.__none__', 'DELETE');
}

function setSyncStatus(ok) {
  synced = ok;
  var dot = document.getElementById('syncDot');
  var lbl = document.getElementById('syncLabel');
  dot.style.background  = ok ? 'var(--green)' : 'var(--red)';
  dot.style.animation   = ok ? 'pulse 1.5s infinite' : 'none';
  lbl.textContent       = t(ok ? 'syncOk' : 'syncErr');
}

// ============================================================
// SLOTS
// ============================================================
function pad(n) { return n < 10 ? '0'+n : ''+n; }
function toMin(h,m) { return h*60+m; }
function fromMin(total) { return {h:Math.floor(total/60)%24, m:total%60}; }

function genSlots() {
  var arr=[], start=toMin(ls.startH,ls.startM);
  var end=(ls.endH===24&&ls.endM===0)?1440:toMin(ls.endH,ls.endM);
  for(var tt=start;tt<end;tt+=15){
    var cur=fromMin(tt), nxt=fromMin(tt+15);
    arr.push({
      key: cur.h+':'+pad(cur.m),
      label: pad(cur.h)+'H'+pad(cur.m)+' - '+(tt+15>=1440?'00H00':pad(nxt.h)+'H'+pad(nxt.m))
    });
  }
  return arr;
}

function getCurrentKey() {
  var n=new Date();
  return n.getHours()+':'+pad(Math.floor(n.getMinutes()/15)*15);
}

// ============================================================
// RENDU
// ============================================================
function renderSlots() {
  var now=new Date();
  document.getElementById('bTime').textContent=pad(now.getHours())+':'+pad(now.getMinutes());
  document.getElementById('headerName').textContent=ls.headerName;
  document.getElementById('headerSub').textContent=ls.headerSub+' ✏️';
  document.getElementById('pollTitle').textContent=ls.pollTitle;

  var inp=document.getElementById('nameInput');
  if(ls.userName && !inp.value) inp.value=ls.userName;

  var search=document.getElementById('searchInp').value.toLowerCase();
  var curKey=getCurrentKey();
  var SLOTS=genSlots();
  var total=allVotes.length;
  var free=0, taken=0, curLabel='';
  var list=document.getElementById('optionsList');
  list.innerHTML='';

  SLOTS.forEach(function(slot){
    if(search && slot.label.toLowerCase().indexOf(search)===-1) return;
    var voters=allVotes.filter(function(v){return v.slot_key===slot.key;}).map(function(v){return v.user_name;});
    var isMine=(ls.userName!==''&&voters.indexOf(ls.userName)!==-1);
    var isCur=(slot.key===curKey);
    if(isCur) curLabel=slot.label;
    if(voters.length===0) free++; else taken++;
    var pct=(total>0&&voters.length>0)?Math.max(Math.round(voters.length/total*100),5):0;

    var row=document.createElement('div');
    row.className='option-row'+(isMine?' selected':'')+(isCur?' current-slot':'');

    var avatarsHTML=voters.slice(0,3).map(function(n){
      return '<div class="voter-av" style="background:'+getColor(n)+'" title="'+n+'">'+getInitials(n)+'</div>';
    }).join('');

    row.innerHTML=
      '<div class="wa-circle"><svg class="wa-check" width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>'+
      '<div class="option-content">'+
        '<div class="option-time">🙏 '+slot.label+(isCur?' <span class="now-badge">'+t('nowBadge')+'</span>':'')+'</div>'+
        '<div class="option-bar-wrap"><div class="option-bar" style="width:'+pct+'%"></div></div>'+
      '</div>'+
      '<div class="voter-stack">'+avatarsHTML+'<div class="voter-count">'+(voters.length>0?voters.length:'')+'</div></div>';

    (function(sk, mine){
      row.onclick=function(){
        if(!ls.userName){ showToast(t('enterName')); return; }
        row.classList.add('loading-row');
        var op=mine ? removeVote(sk,ls.userName) : addVote(sk,ls.userName);
        op.then(function(r){ if(!r.ok) throw new Error(); return loadVotes(); })
          .then(function(){ renderSlots(); })
          .catch(function(){ showToast(t('errConn')); row.classList.remove('loading-row'); });
      };
    })(slot.key, isMine);

    list.appendChild(row);
  });

  if(list.children.length===0){
    list.innerHTML='<div class="empty-msg">'+t('noVotes')+'</div>';
  }

  var freeText=free+(free!==1?' '+t('free'):' '+t('freeOne'));
  document.getElementById('sFree').textContent=freeText;
  document.getElementById('sTaken').textContent=taken+' '+t('taken');
  document.getElementById('sNow').textContent=curLabel?'⏰ '+curLabel:'';
}

// ============================================================
// PRENOM
// ============================================================
function setName(){
  var v=document.getElementById('nameInput').value.trim();
  if(!v){showToast(t('enterName').replace('✏️ ',''));return;}
  ls.userName=v; saveLocal(); renderSlots();
  showToast(t('hello')+v+' !');
}

// ============================================================
// VOTERS
// ============================================================
function openVoters(){
  document.getElementById('votersTitle').textContent=t('votersTitle');
  document.getElementById('btnVotersClose').textContent=t('btnVotersClose');
  var SLOTS=genSlots(), list=document.getElementById('voterList');
  list.innerHTML='';
  var has=false;
  SLOTS.forEach(function(slot){
    allVotes.filter(function(v){return v.slot_key===slot.key;}).forEach(function(v){
      has=true;
      var item=document.createElement('div');
      item.className='voter-item';
      item.innerHTML='<div class="vi-av" style="background:'+getColor(v.user_name)+'">'+getInitials(v.user_name)+'</div>'+
        '<div><div style="font-size:14px">'+v.user_name+'</div>'+
        '<div style="font-size:12px;color:var(--muted)">🙏 '+slot.label+'</div></div>';
      list.appendChild(item);
    });
  });
  if(!has) list.innerHTML='<div class="empty-msg">'+t('noVotes')+'</div>';
  document.getElementById('votersModal').classList.add('open');
}
function closeVoters(){ document.getElementById('votersModal').classList.remove('open'); }

// ============================================================
// ADMIN — SELECTS
// ============================================================
function buildSelects(){
  var ss=document.getElementById('slotStart'), se=document.getElementById('slotEnd');
  ss.innerHTML=''; se.innerHTML='';
  for(var tt=0;tt<1440;tt+=15){
    var hm=fromMin(tt), o=document.createElement('option');
    o.value=tt; o.textContent=pad(hm.h)+'H'+pad(hm.m); ss.appendChild(o);
  }
  for(var tt2=15;tt2<=1440;tt2+=15){
    var hm2=fromMin(tt2%1440), o2=document.createElement('option');
    o2.value=tt2;
    o2.textContent=tt2===1440?t('midnight'):pad(hm2.h)+'H'+pad(hm2.m);
    se.appendChild(o2);
  }
}

function updateSlotCount(){
  var s=parseInt(document.getElementById('slotStart').value,10);
  var e=parseInt(document.getElementById('slotEnd').value,10);
  document.getElementById('slotCountDisp').textContent=(e>s)?Math.floor((e-s)/15):0;
}

function openAdmin(){
  document.getElementById('adminLock').style.display='block';
  document.getElementById('adminContent').style.display='none';
  document.getElementById('adminPwd').value='';
  applyTranslations();
  document.getElementById('adminModal').classList.add('open');
  setTimeout(function(){document.getElementById('adminPwd').focus();},200);
}
function closeAdmin(){ document.getElementById('adminModal').classList.remove('open'); }

function unlockAdmin(){
  if(document.getElementById('adminPwd').value!==ADMIN_PWD){
    showToast(t('wrongPwd'));
    document.getElementById('adminPwd').value='';
    document.getElementById('adminPwd').focus();
    return;
  }
  document.getElementById('editName').value=ls.headerName;
  document.getElementById('editSub').value=ls.headerSub;
  document.getElementById('editPollTitle').value=ls.pollTitle;
  var sm=toMin(ls.startH,ls.startM);
  var em=(ls.endH===24&&ls.endM===0)?1440:toMin(ls.endH,ls.endM);
  buildSelects();
  document.getElementById('slotStart').value=sm;
  document.getElementById('slotEnd').value=em;
  updateSlotCount();
  document.getElementById('adminLock').style.display='none';
  document.getElementById('adminContent').style.display='block';
}

function saveAdmin(){
  var newName=document.getElementById('editName').value.trim();
  var newSub=document.getElementById('editSub').value.trim();
  var newTitle=document.getElementById('editPollTitle').value.trim();
  var sm=parseInt(document.getElementById('slotStart').value,10);
  var em=parseInt(document.getElementById('slotEnd').value,10);
  if(isNaN(sm)||isNaN(em)||em<=sm){showToast(t('errSlot'));return;}
  if(newName) ls.headerName=newName;
  if(newSub)  ls.headerSub=newSub;
  if(newTitle) ls.pollTitle=newTitle;
  var shm=fromMin(sm); ls.startH=shm.h; ls.startM=shm.m;
  if(em===1440){ls.endH=24;ls.endM=0;}
  else{var ehm=fromMin(em);ls.endH=ehm.h;ls.endM=ehm.m;}
  saveLocal();
  Promise.all([
    saveConfigKey('headerName',ls.headerName),
    saveConfigKey('headerSub',ls.headerSub),
    saveConfigKey('pollTitle',ls.pollTitle),
    saveConfigKey('startMin',sm),
    saveConfigKey('endMin',em)
  ]).catch(function(){});
  renderSlots(); closeAdmin(); showToast(t('saved'));
}

function doReset(){
  if(!confirm(t('resetConfirm'))) return;
  resetAllVotes()
    .then(function(r){ if(!r.ok) throw new Error(); return loadVotes(); })
    .then(function(){ renderSlots(); closeAdmin(); showToast(t('resetDone')); })
    .catch(function(){ showToast(t('errReset')); });
}

// ============================================================
// TOAST
// ============================================================
var toastTimer;
function showToast(msg){
  var t2=document.getElementById('toast');
  t2.textContent=msg; t2.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){t2.classList.remove('show');},3000);
}

// ============================================================
// CLAVIER
// ============================================================
document.getElementById('nameInput').addEventListener('keydown',function(e){if(e.key==='Enter')setName();});
document.getElementById('adminPwd').addEventListener('keydown',function(e){if(e.key==='Enter')unlockAdmin();});

// ============================================================
// POLLING 5 secondes
// ============================================================
function startPolling(){
  setInterval(function(){
    loadVotes().then(function(){renderSlots();});
  },5000);
}

// ============================================================
// HORLOGE
// ============================================================
setInterval(function(){
  var n=new Date();
  document.getElementById('bTime').textContent=pad(n.getHours())+':'+pad(n.getMinutes());
},30000);

// ============================================================
// DEMARRAGE
// ============================================================
loadLocal();
currentLang = ls.lang || 'fr';
['fr','de','en'].forEach(function(l){
  document.getElementById('btn-'+l).classList.toggle('active', l===currentLang);
});
buildSelects();
if(ls.userName) document.getElementById('nameInput').value=ls.userName;
applyTranslations();
loadConfig()
  .then(function(){return loadVotes();})
  .then(function(){renderSlots(); startPolling();})
  .catch(function(){renderSlots(); startPolling();});
</script>
